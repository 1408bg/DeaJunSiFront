<!DOCTYPE html>
<html lang="ko">
<head>
  <title>대전시</title>

  <link href="index.css" rel="stylesheet">
</head>
<body>
  <div id="wrap">
    <header>
      <a href="https://daejeonsi.nanu.cc"><img id="logo" src="https://daejeonsi.nanu.cc/assets/DJS_LOGO_WIDE.png"></a>
      <a href="https://daejeonsi.nanu.cc/login" id="logI">로그인</a>
    </header>
    <section>
      <div class="page">
        <div class="login-wrapper">
            <h2 id="logT">Sign Up</h2>
            <form method="post" action="https://daejeonsi.nanu.cc/api_register" id="login-form">
              <input type="text" name="userName" placeholder="Email">
              <input type="password" name="userPassword" placeholder="Password">
              <input type="submit" value="Sign Up">
            </form>
        </div>
        <div id="addUser">
          <p>이미 계정이 있다면?</p>
          <a href="#">로그인</a>
        </div>
      </div>
    </section>
    <footer>
      
    </footer>
  </div>
</body>
</html>
