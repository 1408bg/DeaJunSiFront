<!DOCTYPE html>
<html lang="ko">
<head>
  <title>대전시</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://daejeonsi.nanu.cc/assets/logo.png">
  <link href="index.css" rel="stylesheet">
</head>
<body>
  <div id="wrap">
    <header>
      <a href="https://daejeonsi.nanu.cc"><img id="logo" src="https://daejeonsi.nanu.cc/assets/DJS_LOGO_WIDE.png"></a>
      <a href="https://daejeonsi.nanu.cc/login" id="logI">로그인</a>
    </header>
    <section>
      <div class="page">
          <div class="login-wrapper">
              <h2 id="logT">Login</h2>
              <form method="post" action="https://daejeonsi.nanu.cc/api_register" id="login-form">
                <input type="text" name="userName" placeholder="Email">
                <input type="password" name="userPassword" placeholder="Password">
                <label for="remember-check">
                  <p>아이디 저장하기</p>
                  <input type="checkbox" id="remember-check">
                </label>
                <input type="submit" value="Login">
              </form>
          </div>
        <div id="addUser">
          <p>계정이 없으신가요?</p>
          <a href="#">회원가입</a>
        </div>
      </div>
    </section>
    <footer>
      
    </footer>
  </div>
</body>
</html>
